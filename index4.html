<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema CETAC 12 PRO</title>

<style>

/* FONDO AZUL OSCURO */
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: #0D1B2A;
    color:#333;
    overflow-x:hidden;
    text-align:center;
    min-height:100vh;
}

/* ANIMACIÓN GENERAL */
* {
    transition: all 0.3s ease;
}

/* LOGIN */
#login {
    text-align:center;
    margin-top:120px;
    animation: fadeIn 1s ease;
    position: relative;
    z-index: 2;
}

/* 🌙 LUNAS */
.luna {
    position:fixed;
    top:-10px;
    color:white;
    user-select:none;
    pointer-events:none;
    animation:caer linear infinite;
    z-index:0;
    text-shadow: 0 0 10px white, 0 0 20px white;
}

input {
    padding:10px;
    margin:8px;
    border-radius:8px;
    border:none;
    outline:none;
    width:200px;
    text-align:center;
}

/* 🔵 BOTONES AZULES */
button {
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background: linear-gradient(45deg, #1E3A8A, #2563EB);
    color:white;
    cursor:pointer;
}

button:hover {
    transform: scale(1.05);
    background: linear-gradient(45deg, #2563EB, #1E3A8A);
}

/* SIDEBAR */
.sidebar {
    width:230px;
    height:100vh;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    position:fixed;
    color:white;
    padding-top:20px;
    z-index:2;
    text-align:center;
}

.sidebar h2 {
    text-align:center;
}

.sidebar button {
    width:100%;
    background:none;
    text-align:center;
    padding:12px;
}

.sidebar button:hover {
    background: rgba(255,255,255,0.2);
}

/* MAIN */
.main {
    margin-left:230px;
    padding:20px;
    position: relative;
    z-index:2;
}

/* TARJETAS */
.card {
    background: rgba(255,255,255,0.9);
    padding:20px;
    margin:15px auto;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation: fadeUp 0.5s ease;
    text-align:center;
    max-width:800px;
}

.card h2,.card p {
    text-align:center;
}

.card:hover {
    transform: translateY(-5px);
}

/* TABLAS */
table {
    width:100%;
    border-collapse:collapse;
    margin:0 auto;
}

td,th {
    padding:10px;
    text-align:center;
}

tr:nth-child(even) {
    background:#f2f2f2;
}

/* SECCIONES */
.seccion {
    display:none;
}

.activa {
    display:block;
    animation: fadeIn 0.5s ease;
}

/* ANIMACIONES */
@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

@keyframes fadeUp {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

/* CAÍDA */
@keyframes caer {
    from {
        transform: translateY(0);
        opacity: 1;
    }
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2 style="color:white;">Sistema CETAC 12</h2>
    <input id="usuario" placeholder="Usuario"><br>
    <input id="password" type="password" placeholder="Contraseña"><br>
    <button onclick="entrar()">Ingresar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="sidebar">
    <h2>CETAC 12</h2>
    <button onclick="mostrar('dashboard')">🏠 Inicio</button>
    <button onclick="mostrar('registro')">➕ Registrar</button>
    <button onclick="mostrar('lista')">📋 Alumnos</button>
    <button onclick="mostrar('calificaciones')">📊 Calificaciones</button>
</div>

<div class="main">

<div id="dashboard" class="seccion activa">
    <div class="card">
        <h2>Panel Principal</h2>
        <p>Sistema escolar con interfaz moderna</p>
    </div>
</div>

<div id="registro" class="seccion">
    <div class="card">
        <h2>Registrar Alumno</h2>
        <input id="nombre" placeholder="Nombre"><br>
        <input id="grupo" placeholder="Grupo"><br>
        <button onclick="registrar()">Guardar</button>
    </div>
</div>

<div id="lista" class="seccion">
    <div class="card">
        <h2>Lista de Alumnos</h2>
        <table id="tablaAlumnos"></table>
    </div>
</div>

<div id="calificaciones" class="seccion">
    <div class="card">
        <h2>Agregar Calificación</h2>
        <input id="alumnoCal" placeholder="Nombre"><br>
        <input id="calificacion" placeholder="Calificación"><br>
        <button onclick="guardarCalificacion()">Guardar</button>
    </div>

    <div class="card">
        <h2>Calificaciones</h2>
        <table id="tablaCalificaciones"></table>
    </div>
</div>

</div>
</div>

<script>

// 🌙 GENERAR LUNAS
function crearLuna() {
    const luna = document.createElement("div");
    luna.classList.add("luna");

    luna.innerHTML = "🌙";

    luna.style.left = Math.random() * window.innerWidth + "px";
    luna.style.fontSize = (Math.random() * 10 + 15) + "px";
    luna.style.animationDuration = (Math.random() * 4 + 3) + "s";

    document.body.appendChild(luna);

    setTimeout(() => {
        luna.remove();
    }, 7000);
}

setInterval(crearLuna, 250);

// LOGIN
function entrar(){
    let u=document.getElementById("usuario").value;
    let p=document.getElementById("password").value;

    if(u==="admin" && p==="1234"){
        login.style.display="none";
        app.style.display="block";
        cargarAlumnos();
        cargarCalificaciones();
    } else alert("Error");
}

// NAVEGACIÓN
function mostrar(sec){
    document.querySelectorAll(".seccion").forEach(s=>s.classList.remove("activa"));
    document.getElementById(sec).classList.add("activa");
}

// REGISTRAR
function registrar(){
    let nombre=document.getElementById("nombre").value;
    let grupo=document.getElementById("grupo").value;

    let alumnos=JSON.parse(localStorage.getItem("alumnos"))||[];
    alumnos.push({nombre,grupo});
    localStorage.setItem("alumnos",JSON.stringify(alumnos));

    cargarAlumnos();
    alert("Alumno agregado");
}

// MOSTRAR ALUMNOS
function cargarAlumnos(){
    let tabla=document.getElementById("tablaAlumnos");
    let alumnos=JSON.parse(localStorage.getItem("alumnos"))||[];

    tabla.innerHTML="<tr><th>Nombre</th><th>Grupo</th><th>Acciones</th></tr>";

    alumnos.forEach((a,i)=>{
        tabla.innerHTML+=`
        <tr>
        <td>${a.nombre}</td>
        <td>${a.grupo}</td>
        <td>
        <button onclick="editar(${i})">✏️</button>
        <button onclick="eliminar(${i})">🗑️</button>
        </td>
        </tr>`;
    });
}

// EDITAR
function editar(i){
    let alumnos=JSON.parse(localStorage.getItem("alumnos"));
    let nuevoNombre=prompt("Nuevo nombre:", alumnos[i].nombre);
    let nuevoGrupo=prompt("Nuevo grupo:", alumnos[i].grupo);

    if(nuevoNombre && nuevoGrupo){
        alumnos[i]={nombre:nuevoNombre,grupo:nuevoGrupo};
        localStorage.setItem("alumnos",JSON.stringify(alumnos));
        cargarAlumnos();
    }
}

// ELIMINAR
function eliminar(i){
    let alumnos=JSON.parse(localStorage.getItem("alumnos"));
    alumnos.splice(i,1);
    localStorage.setItem("alumnos",JSON.stringify(alumnos));
    cargarAlumnos();
}

// CALIFICACIONES
function guardarCalificacion(){
    let nombre=document.getElementById("alumnoCal").value;
    let cal=parseFloat(document.getElementById("calificacion").value);

    let calificaciones=JSON.parse(localStorage.getItem("calificaciones"))||[];
    calificaciones.push({nombre,cal});
    localStorage.setItem("calificaciones",JSON.stringify(calificaciones));

    cargarCalificaciones();
}

// MOSTRAR CALIFICACIONES
function cargarCalificaciones(){
    let tabla=document.getElementById("tablaCalificaciones");
    let datos=JSON.parse(localStorage.getItem("calificaciones"))||[];

    tabla.innerHTML="<tr><th>Nombre</th><th>Calificación</th><th>Acción</th></tr>";

    let suma=0;

    datos.forEach((c,i)=>{
        suma+=c.cal;

        tabla.innerHTML+=`
        <tr>
        <td>${c.nombre}</td>
        <td>${c.cal}</td>
        <td><button onclick="eliminarCal(${i})">🗑️</button></td>
        </tr>`;
    });

    let promedio=datos.length? (suma/datos.length).toFixed(2):0;

    tabla.innerHTML+=`
    <tr>
    <td><b>PROMEDIO</b></td>
    <td colspan="2"><b>${promedio}</b></td>
    </tr>`;
}

// ELIMINAR CALIFICACIÓN
function eliminarCal(i){
    let datos=JSON.parse(localStorage.getItem("calificaciones"));
    datos.splice(i,1);
    localStorage.setItem("calificaciones",JSON.stringify(datos));
    cargarCalificaciones();
}

</script>

</body>
</html>
